name: Release Obsidian Plugin

on:
    push:
        # Sequence of patterns matched against refs/tags
        tags:
            - "*"

jobs:
    build:
        runs-on: ubuntu-latest

        # FIX #1: Grant explicit write permissions to let the runner build the release
        permissions:
            contents: write

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Build Plugin
              run: npm run build

            - name: Create GitHub Release
              id: create_release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  generate_release_notes: true
                  draft: false
                  prerelease: false
                  # FIX #2: Explicit, clean asset mapping with no empty-string bugs
                  files: |
                      main.js
                      manifest.json
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
