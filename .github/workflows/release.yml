name: Release Obsidian Plugin

on:
    push:
        # Sequence of patterns matched against refs/tags
        tags:
            - "v*" # Triggers the workflow only when you push a version tag like v1.0.1

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Build Plugin
              run: npm run build

            - name: Package Assets
              id: package
              run: |
                  # Verifies files exist before running release step
                  echo "Validating production build artifacts..."
                  ls -la main.js manifest.json
                  if [ -f styles.css ]; then
                    echo "has_css=true" >> $GITHUB_OUTPUT
                  else
                    echo "has_css=false" >> $GITHUB_OUTPUT
                  fi

            - name: Create GitHub Release
              id: create_release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  files: |
                      main.js
                      manifest.json
                      ${{ steps.package.outputs.has_css == 'true' && 'styles.css' || '' }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
